<!DOCTYPE html>
<html>
<head>
    <title>Login Test</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        input { padding: 8px; margin: 5px 0; width: 300px; display: block; }
        button { padding: 10px 20px; margin-top: 10px; }
        #result { margin-top: 20px; border: 1px solid #ccc; padding: 10px; }
    </style>
</head>
<body>
    <h1>Test ZippyRoute Login</h1>
    
    <h2>Register New User</h2>
    <form id="registerForm">
        <input type="email" id="reg-email" placeholder="Email" required />
        <input type="text" id="reg-fullName" placeholder="Full Name" required />
        <input type="text" id="reg-phoneNumber" placeholder="Phone Number" required />
        <input type="password" id="reg-password" placeholder="Password" required />
        <button type="submit">Register</button>
    </form>
    
    <h2>Login</h2>
    <form id="loginForm">
        <input type="email" id="login-email" placeholder="Email" required />
        <input type="password" id="login-password" placeholder="Password" required />
        <button type="submit">Login</button>
    </form>
    
    <div id="result"></div>
    
    <script>
        const API_BASE_URL = 'http://localhost:8080/api';
        
        // Register
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                email: document.getElementById('reg-email').value,
                fullName: document.getElementById('reg-fullName').value,
                phoneNumber: document.getElementById('reg-phoneNumber').value,
                password: document.getElementById('reg-password').value
            };
            
            try {
                const response = await fetch(API_BASE_URL + '/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                document.getElementById('result').innerHTML = `
                    <h3>Registration Response (${response.status}):</h3>
                    <pre>${JSON.stringify(result, null, 2)}</pre>
                `;
                console.log('Register Response:', result);
            } catch (error) {
                document.getElementById('result').innerHTML = `<p>Error: ${error.message}</p>`;
            }
        });
        
        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                email: document.getElementById('login-email').value,
                password: document.getElementById('login-password').value
            };
            
            try {
                const response = await fetch(API_BASE_URL + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                document.getElementById('result').innerHTML = `
                    <h3>Login Response (${response.status}):</h3>
                    <pre>${JSON.stringify(result, null, 2)}</pre>
                    ${result.token ? `<p style="color: green;"><b>✓ Login Successful!</b></p>` : `<p style="color: red;"><b>✗ Login Failed</b></p>`}
                `;
                console.log('Login Response:', result);
            } catch (error) {
                document.getElementById('result').innerHTML = `<p>Error: ${error.message}</p>`;
            }
        });
    </script>
</body>
</html>
