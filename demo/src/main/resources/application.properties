spring.application.name=ZippyRoute

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/zippyroute_db
spring.datasource.username=postgres
spring.datasource.password=Suraj@123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# JWT Configuration
jwt.secret=ZippyRouteSecretKeyForJWTTokenGeneration2024WithVeryLongKeyForHS512EncryptionAndBeyondMaximumSecurityRequilements
jwt.expiration=86400000

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:8000,http://localhost:3000,http://localhost:8081
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Security Configuration
spring.security.filter.order=5
management.endpoints.web.exposure.include=*
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration